<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Day Strategic Menu Tool</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        
        .dashboard-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 30px;
            /* ขยายความกว้างกล่องให้รองรับ 11 คอลัมน์ */
            max-width: 1100px; 
            width: 100%;
            overflow-x: auto; /* เพิ่ม Scrollbar แนวนอนถ้าจอมือถือเล็ก */
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .nav-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        h1 {
            color: #2c3e50;
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        p.subtitle {
            color: #7f8c8d;
            margin: 0;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #3498db;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Alternate row colors */
        tr:nth-child(even) {
            background-color: #f9fbfd;
        }

        tr:hover {
            background-color: #f1f5f9;
            transition: background-color 0.3s ease;
        }

        /* Price status styling */
        .status-up { color: #e74c3c; font-weight: bold; }     /* Red - price increased */
        .status-down { color: #27ae60; font-weight: bold; }   /* Green - price decreased */
        .status-stable { color: #f39c12; font-weight: bold; } /* Yellow - price stable */

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>7-Day Predicted Price</h1>
            <p class="subtitle">Ingredient price forecasting and budget planning system for the next 7 days</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ingredient</th>
                    <th>Current</th>
                    <th>Day 1</th>
                    <th>Day 2</th>
                    <th>Day 3</th>
                    <th>Day 4</th>
                    <th>Day 5</th>
                    <th>Day 6</th>
                    <th>Day 7</th>
                    <th>Trend</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <div class="footer-note">
            * Predicted price data is automatically updated from the JSON file.<br>
            
        </div>
            
        <div style="text-align: right; margin-top: 20px;">
            <a href="menus.html" class="nav-btn">Go to Menus</a>
        </div>
    </div>

    <script>
        // Function to fetch JSON file and build the table
        async function loadPredictedPrices() {
            try {
                // 1. Fetch the file generated by Python
                const response = await fetch('predicted_prices.json');
                const data = await response.json();
                
                const tbody = document.getElementById('tableBody');
                // Clear the table before populating with new data
                tbody.innerHTML = '';
                let index = 1;

                // 2. Loop through each ingredient
                for (const [ingredient, prices] of Object.entries(data)) {
                    
                    // Guard against missing 7-day array
                    if (!prices.predicted_7_days) {
                        console.warn(`Missing predicted_7_days data for: ${ingredient}`);
                        continue;
                    }

                    const currentPrice = prices.current;
                    
                    // a. Generate <td> elements for all 7 days
                    let daysHTML = '';
                    prices.predicted_7_days.forEach(price => {
                        daysHTML += `<td>${price.toFixed(2)}</td>`;
                    });

                    // b. Calculate the difference: Day 7 price - current price
                    const lastDayPrice = prices.predicted_7_days[6];
                    let percentChange = ((lastDayPrice - currentPrice) / currentPrice) * 100;
                    
                    // 3. Trend logic: Up / Down / Stable
                    let trendHTML = '';

                    
                    if (percentChange > 5) {
                        trendHTML = `<td class="status-up">🔺 Price Up (+${percentChange.toFixed(1)}%)</td>`;
                    } 
                    
                    else if (percentChange < -5) {
                        trendHTML = `<td class="status-down">🔻  Price Down (${percentChange.toFixed(1)}%)</td>`;
                    } 
                    
                    else {
                        
                        let sign = percentChange > 0 ? '+' : '';
                        trendHTML = `<td class="status-stable">➖ Stable (${sign}${percentChange.toFixed(1)}%)</td>`;
                    }

                    
                    const cleanIngredientName = ingredient.replace('Price_', '');

                    // 4. Build the table row HTML
                    const row = `
                        <tr>
                            <td>${index}</td>
                            <td><strong>${cleanIngredientName}</strong></td>
                            <td style="color: #2980b9;"><strong>${currentPrice.toFixed(2)}</strong></td>
                            ${daysHTML}
                            ${trendHTML}
                        </tr>
                    `;
                    tbody.innerHTML += row;
                    index++;
                }
            } catch (error) {
                console.error("Failed to load data file:", error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan='11' style='text-align: center; color: red;'>Error: ${error.message}</td></tr>`;
            }
        }

        // Run immediately when the page loads
        loadPredictedPrices();
    </script>
</body>
</html>
